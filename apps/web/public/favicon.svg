<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- App icon: coral building, one window "lost" (paper gap), door ajar -->
  <rect width="512" height="512" rx="116" fill="#d9604c"/>
  <!-- building body -->
  <rect x="141" y="106" width="230" height="300" rx="26" fill="#ffffff"/>
  <!-- windows (coral) -->
  <rect x="181" y="150" width="58" height="58" rx="10" fill="#d9604c"/>
  <rect x="273" y="150" width="58" height="58" rx="10" fill="#d9604c"/>
  <rect x="181" y="238" width="58" height="58" rx="10" fill="#d9604c"/>
  <!-- the "lost" window: outlined only, home gone -->
  <rect x="280" y="245" width="44" height="44" rx="8" fill="none" stroke="#d9604c" stroke-width="7" stroke-dasharray="14 10"/>
  <!-- ground-floor window -->
  <rect x="181" y="326" width="58" height="58" rx="10" fill="#d9604c"/>
  <!-- door: paper square with dark coral frame, nudged out like the brand mark -->
  <rect x="292" y="316" width="94" height="90" rx="8" fill="#f7f3eb" stroke="#9b3b30" stroke-width="16"/>
</svg>
